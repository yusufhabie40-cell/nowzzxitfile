<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nowzz Xit</title>

<!-- FONT (lebih stabil) -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Exo 2',sans-serif;
background:linear-gradient(135deg,#0c0c1e,#1a0033,#000428);
color:#fff;
overflow-x:hidden;
}

/* STARS */
.stars{position:fixed;width:100%;height:100%;z-index:1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate}
@keyframes twinkle{from{opacity:.3}to{opacity:1}}

/* HEADER */
.header{
position:relative;
z-index:10;
padding:20px;
background:rgba(0,0,0,.8);
text-align:center;
}

.logo{
font-family:'Orbitron';
font-size:28px;
font-weight:900;
background:linear-gradient(45deg,#00ffff,#ff00ff,#ffff00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
z-index:10;
position:relative;
}

.hero h1{
font-family:'Orbitron';
font-size:40px;
background:linear-gradient(45deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 10px #00ffff)}
to{filter:drop-shadow(0 0 20px #ff00ff)}
}

.hero p{opacity:.8;margin-top:15px}

/* PRODUCTS */
.products{padding:50px 20px;text-align:center;z-index:10;position:relative}

.products h2{
font-family:'Orbitron';
margin-bottom:30px;
background:linear-gradient(45deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
border:1px solid rgba(0,255,255,.3);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,255,255,.4);
}

.btn{
margin-top:15px;
padding:12px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#00ffff,#ff00ff);
font-weight:bold;
cursor:pointer;
}

/* WA FLOAT */
.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
font-size:18px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="header">
<div class="logo">🚀 NOWZZ XIT</div>
</div>

<div class="hero">
<h1>Free Fire VVIP Files</h1>
<p>Premium Space Edition - Unlock the ultimate gaming experience</p>
</div>

<div class="products">
<h2>💎 Premium Products</h2>

<div class="grid">

<div class="card">
<h3>Aim Body</h3>
<p>VVIP</p>
<button class="btn" onclick="buy()">Beli</button>
</div>

<div class="card">
<h3>Drag HS Premium</h3>
<p>VVIP</p>
<button class="btn" onclick="buy()">Beli</button>
</div>

<div class="card">
<h3>Glowall Gepeng</h3>
<p>Elite</p>
<button class="btn" onclick="buy()">Beli</button>
</div>

</div>
</div>

<a href="https://wa.me/6285353382404" class="wa">WA</a>

<script>
// bintang
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
s.style.width=s.style.height=(Math.random()*3)+"px";
document.getElementById("stars").appendChild(s);
}

// tombol beli
function buy(){
window.open("https://wa.me/6285353382404","_blank");
}
</script>

</body>
</html>
